kind = "web"
previewPath = "/"
title = "GOLPE - Blefe e Poder"
version = "1.0.0"
id = "artifacts/golpe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19349

[services.development]
run = "pnpm --filter @workspace/golpe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/golpe", "run", "build" ]
publicDir = "artifacts/golpe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19349"
BASE_PATH = "/"
